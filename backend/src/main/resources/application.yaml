spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5432/stagepassport
    username: stagepassport
    password: stagepassport
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

firebase:
  service-account-path: secrets/firebase-service-account.json